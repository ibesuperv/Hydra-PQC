version: '3.8'

services:
  node1:
    build: .
    container_name: hydrastore_node1
    command: >
      -mode single 
      -node-id node1 
      -node-addr :3000 
      -bootstrap 10.5.0.12:3000,10.5.0.13:3000,10.5.0.14:3000,10.5.0.15:3000 
      -api :8080
    networks:
      hydra_net:
        ipv4_address: 10.5.0.11
    ports:
      - "8080:8080"
    environment:
      - DFS_MASTER_KEY=${DFS_MASTER_KEY:-12345678901234567890123456789012}
      - DFS_API_KEY=${DFS_API_KEY:-dev-api-key}

  node2:
    build: .
